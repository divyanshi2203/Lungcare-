{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cancer Image Classification</title>
  <!-- Bootstrap CSS via CDN (you can also download and put in static files) -->
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 2rem; }
    .result-img { max-width: 400px; max-height: 400px; }
  </style>
</head>
<body>
<div class="container">
  <h1 class="mb-4">Cancer Image Classifier</h1>

  <form method="POST" enctype="multipart/form-data" class="mb-4">
    {% csrf_token %}
    <div class="form-group">
      {{ form.image.label_tag }} <!-- Label for file input -->
      {{ form.image }}           <!-- File input field -->
    </div>
    <button type="submit" class="btn btn-primary">Upload and Classify</button>
  </form>

  {% if prediction %}
    <h3>Result:</h3>
    <p>The model predicts this image is: <strong>{{ prediction|capfirst }}</strong></p>
    {% if image_data %}
      <img src="{{ image_data }}" alt="Uploaded Image" class="result-img">
    {% endif %}
  {% endif %}
</div>
<!-- Bootstrap JS and dependencies (optional for any interactive components) -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
