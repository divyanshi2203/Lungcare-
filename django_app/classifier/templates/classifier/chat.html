{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Healthcare Chat Assistant</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f7f7f7; padding: 2rem; }
    .chat-box { background: white; border-radius: 15px; padding: 1rem; height: 500px; overflow-y: auto; }
    .chat-message { margin: 10px 0; }
    .bot-msg { text-align: left; background: #e1f0ff; padding: 10px; border-radius: 10px; display: inline-block; }
    .user-msg { text-align: right; background: #d1ffd7; padding: 10px; border-radius: 10px; display: inline-block; }
  </style>
</head>
<body>
<div class="container">
  <h2 class="mb-3">Healthcare Chat Assistant</h2>
  <div id="chat-box" class="chat-box">
    <div class="chat-message bot-msg">Please upload your image to begin.</div>
  </div>
  <div class="mt-3">
    <input type="file" id="imageInput" class="form-control mb-2">
    <button id="sendImageBtn" class="btn btn-primary">Upload</button>
  </div>
</div>

<script>
const chatBox = document.getElementById('chat-box');
const imageInput = document.getElementById('imageInput');
const sendImageBtn = document.getElementById('sendImageBtn');

function appendMessage(message, sender='bot') {
  const div = document.createElement('div');
  div.classList.add('chat-message', sender === 'bot' ? 'bot-msg' : 'user-msg');
  div.textContent = message;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

sendImageBtn.onclick = async () => {
  const file = imageInput.files[0];
  if (!file) return alert('Please select an image first.');

  appendMessage('Uploading image...', 'user');

  const formData = new FormData();
  formData.append('image', file);

  const response = await fetch("{% url 'chat_view' %}", {
    method: 'POST',
    body: formData,
  });

  const data = await response.json();
  if (data.prediction === 'cancer') {
    appendMessage(data.message);
    data.doctors.forEach(doc => appendMessage(`${doc.name} - ${doc.link}`));
  } else if (data.prediction === 'normal') {
    appendMessage(data.message);
    Object.entries(data.symptoms).forEach(([key, val]) => {
      appendMessage(`${key}: ${val}`);
    });
    appendMessage('Type 1, 2, or 3 below:', 'bot');
    // Allow text input now
    const input = document.createElement('input');
    input.type = 'text';
    input.classList.add('form-control', 'mt-2');
    input.placeholder = 'Enter 1, 2, or 3';
    chatBox.parentNode.appendChild(input);
    input.addEventListener('keypress', async (e) => {
      if (e.key === 'Enter') {
        appendMessage(input.value, 'user');
        const res = await fetch("{% url 'chat_view' %}", {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({symptom_choice: input.value})
        });
        const followup = await res.json();
        appendMessage(followup.message);
        followup.doctors.forEach(doc => appendMessage(`${doc.name} - ${doc.link}`));
        input.remove();
      }
    });
  }
};
</script>
</body>
</html>
